[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app. Windows targets are
# omitted because src/blit.rs uses `std::os::unix::net::UnixStream`
# for the blit-host protocol — Unix-only by design.
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax).
# macOS + Linux only — see the `installers` comment above.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Which actions to run on pull requests
pr-run-mode = "upload"
# YAML snippet injected into every build job's `steps:` array,
# *before* the build runs. Clones the sibling `../tmnl-protocol`
# that this crate references by path. Lives at
# `.github/build-setup.yml` so GitHub doesn't try to interpret it
# as a standalone workflow.
github-build-setup = "../build-setup.yml"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
